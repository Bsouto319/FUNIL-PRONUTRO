name: Pronutro Poll Safety Net

on:
  schedule:
    # A cada 5 minutos — garante que nenhuma mensagem fique presa
    # se o webhook do WhatsApp não disparar de novo (ex: lock ocupado, falha de entrega)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Chama a função pronutro-poll
        run: |
          curl -sf -X POST "https://pvphgusjofufwtyiyviu.supabase.co/functions/v1/pronutro-poll" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
